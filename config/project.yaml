# =============================================================================
# Project Manifest — config/project.yaml
# =============================================================================
#
# This file declares the boards used in your project, their roles, and how
# they communicate. Edit this after cloning the template to match your setup.
#
# See docs/ARCHITECTURE.md for full documentation on the manifest format.
# =============================================================================

project:
  name: cyberdeck-2026
  description: Battery-powered portable Linux cyberdeck in a thrifted enclosure. Solarpunk-oriented, off-grid-capable personal computing device with cellular and LoRa/Meshtastic networking.

boards:
  - id: pi-zero-2w
    board: raspberry-pi-zero-2w
    language: typescript
    role: Primary SBC running Linux. Hosts display, receives HID input via USB, interfaces with Meshtastic node via @meshtastic/js over USB serial, and manages LTE network interface.

  - id: hid-bridge
    board: xiao-samd21
    language: tinygo
    role: USB HID bridge for ANO rotary encoder and directional input. Presents as keyboard/mouse HID device to Pi over USB.
    connection:
      protocol: usb
      upstream: ch334f-hub

  - id: meshtastic-node
    board: xiao-esp32s3
    language: meshtastic
    role: Dedicated Meshtastic LoRa node using WIO-SX1262 wing. Communicates with Pi over USB serial. Handles all LoRa mesh networking.
    connection:
      protocol: usb-serial
      upstream: ch334f-hub
